# Example: Policy-Driven Build Gate
#
# This workflow fails the build if security policy violations are detected.

name: Security Policy Gate

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  security-check:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write # Comment on PRs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build application
        run: go build -o myapp ./cmd/myapp

      - name: Install Provenix
        run: |
          curl -sSL https://raw.githubusercontent.com/open-verix/provenix/main/scripts/install.sh | sh
          provenix version

      - name: Initialize Provenix
        run: provenix init

      - name: Generate attestation
        run: |
          provenix attest myapp \
            --output attestation.json \
            --skip-transparency

      # exit 0 = pass, exit 1 = policy violation, exit 2 = saved locally
      - name: Check security policy
        id: policy-check
        run: |
          provenix policy check --config provenix.yaml || echo "POLICY_FAILED=true" >> $GITHUB_OUTPUT

      - name: Generate VEX for triaged vulnerabilities
        if: steps.policy-check.outputs.POLICY_FAILED == 'true'
        run: |
          provenix vex generate --output vex.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-artifacts
          path: |
            attestation.json
            vex.json

      - name: Fail build if policy violations found
        if: steps.policy-check.outputs.POLICY_FAILED == 'true'
        run: |
          echo "::error::Security policy violations detected."
          exit 1
