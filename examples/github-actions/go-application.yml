# Example: Attest Go Application
#
# This workflow builds a Go application and attests it with Provenix.
# Copy this template into your repository's .github/workflows/ and adapt as needed.
#
# Required repository permissions: Settings → Actions → Workflow permissions
#   → Allow GitHub Actions to create and approve pull requests (for id-token: write)

name: Attest Go Application

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  build-and-attest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for keyless signing (OIDC)
      contents: write  # Required for release uploads

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build application
        run: |
          go build -trimpath -buildvcs \
            -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o myapp ./cmd/myapp

      - name: Install Provenix
        run: |
          curl -sSL https://raw.githubusercontent.com/open-verix/provenix/main/scripts/install.sh | sh
          provenix version

      - name: Initialize Grype database
        run: provenix init

      - name: Attest binary with Provenix
        run: |
          provenix attest myapp \
            --output attestation.json

      - name: Policy check
        run: provenix policy check --config provenix.yaml

      - name: Upload attestation artifact
        uses: actions/upload-artifact@v4
        with:
          name: attestation
          path: attestation.json

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            myapp
            attestation.json
