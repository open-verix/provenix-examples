name: Validate Templates

on:
  push:
    paths:
      - "examples/**"
      - "docs/**"
      - ".github/workflows/validate-templates.yml"
  pull_request:
    paths:
      - "examples/**"
      - "docs/**"
  workflow_dispatch:

jobs:
  validate-yaml-syntax:
    name: Validate YAML Syntax
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check YAML syntax of all templates
        run: |
          echo "=== Validating YAML syntax ==="
          FAILED=0
          for f in examples/github-actions/*.yml; do
            python3 -c "
          import yaml, sys
          try:
              yaml.safe_load(open('$f').read())
              print('  ✅ $f')
          except yaml.YAMLError as e:
              print('  ❌ $f:', e)
              sys.exit(1)
          " || FAILED=1
          done
          [ $FAILED -eq 0 ] || exit 1

  validate-no-old-urls:
    name: Validate No Hardcoded Binary URLs
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded old binary URLs
        run: |
          echo "=== Checking for deprecated binary URLs ==="
          # Old pattern: /releases/download/v*/provenix-linux-amd64 or provenix-darwin-arm64
          if grep -rn "releases/download.*provenix-linux\|releases/download.*provenix-darwin\|releases/download.*provenix-windows" \
              examples/github-actions/; then
            echo ""
            echo "❌ Found hardcoded binary URLs. Use install.sh instead:"
            echo "   curl -sSL https://raw.githubusercontent.com/open-verix/provenix/main/scripts/install.sh | sh"
            exit 1
          fi
          echo "✅ No hardcoded binary URLs found"

      - name: Check all templates use install.sh
        run: |
          echo "=== Checking install.sh usage ==="
          FAILED=0
          for f in examples/github-actions/*.yml; do
            if ! grep -q "install.sh" "$f"; then
              echo "  ⚠️  $f: does not reference install.sh"
              FAILED=1
            else
              echo "  ✅ $f"
            fi
          done
          [ $FAILED -eq 0 ] || exit 1

  validate-no-invalid-commands:
    name: Validate Provenix Commands
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check for removed/renamed commands
        run: |
          echo "=== Checking for invalid Provenix commands ==="
          FAILED=0

          # Commands that no longer exist, were renamed, or are deprecated
          INVALID_PATTERNS=(
            "provenix verify"
            "provenix report"
            "provenix vex create"
            "./provenix "
            "--config policy.yaml"   # policy is now in provenix.yaml
          )

          for pattern in "${INVALID_PATTERNS[@]}"; do
            if grep -rn "$pattern" examples/ docs/; then
              echo "❌ Found invalid pattern: '$pattern'"
              FAILED=1
            fi
          done

          [ $FAILED -eq 0 ] && echo "✅ No invalid commands found"
          [ $FAILED -eq 0 ] || exit 1

  validate-docs-links:
    name: Validate Documentation Links
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check that docs reference existing files
        run: |
          echo "=== Checking cross-references in docs/github-actions.md ==="
          FAILED=0

          # Extract relative file links from the doc and verify they exist
          grep -oP '\[.*?\]\(\.\./\K[^)]+' docs/github-actions.md | while read -r path; do
            if [ ! -f "$path" ]; then
              echo "  ❌ Broken link: $path"
              FAILED=1
            else
              echo "  ✅ $path"
            fi
          done

          # Direct check for key referenced templates
          REFERENCED=(
            "examples/github-actions/go-application.yml"
            "examples/github-actions/policy-gate.yml"
            "examples/github-actions/multi-arch-build.yml"
            "examples/github-actions/docker-image.yml"
            "examples/go-binary/policy.yaml"
          )

          for ref in "${REFERENCED[@]}"; do
            if [ ! -f "$ref" ]; then
              echo "  ❌ Missing referenced file: $ref"
              FAILED=1
            else
              echo "  ✅ $ref exists"
            fi
          done

          [ $FAILED -eq 0 ] || exit 1
